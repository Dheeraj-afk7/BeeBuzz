services:
  - type: web
    name: beebuzz-backend
    env: node
    buildCommand: npm install && cd BeeBuzz/server && npm install && npm run build
    startCommand: cd BeeBuzz/server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beebuzz-db
          property: connectionString
      - key: PORT
        value: 10000

  - type: web
    name: beebuzz-frontend
    env: static
    buildCommand: cd BeeBuzz/client && npm install && npm run build
    staticPublishPath: BeeBuzz/client/dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: beebuzz-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: VITE_WS_URL
        fromService:
          type: web
          name: beebuzz-backend
          envVarKey: RENDER_EXTERNAL_URL

databases:
  - name: beebuzz-db
    databaseName: beebuzz
    user: beebuzz_user
    plan: free
