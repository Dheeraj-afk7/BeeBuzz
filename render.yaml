services:
  - type: web
    name: beebuzz-backend
    env: node
    buildCommand: npm install && cd BeeBuzz/server && npm install && npm run build
    startCommand: cd BeeBuzz/server && npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: beebuzz-db
          property: connectionString
      - key: PORT
        value: 10000

databases:
  - name: beebuzz-db
    databaseName: beebuzz
    user: beebuzz_user
    plan: free
